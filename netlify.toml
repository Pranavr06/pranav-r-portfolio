[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    # Forces HTTPS (Security)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # FIX FOR "NULL" CORP
    Cross-Origin-Resource-Policy = "same-site"

    # OPTIONAL: Permissions Policy (Bonus points for blocking features you don't use)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    # THE BIG FIX: Content Security Policy
    # Note: If you add SRI hashes to your HTML, you don't need to change this policy.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; object-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src https://fonts.gstatic.com; base-uri 'self'; form-action 'self'; connect-src 'self';"