[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    # Forces HTTPS (Security)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # FIX FOR "NULL" CORP
    Cross-Origin-Resource-Policy = "same-site"

    # OPTIONAL: Permissions Policy (Bonus points for blocking features you don't use)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    # THE BIG FIX: Content Security Policy
    # Note: If you add SRI hashes to your HTML, you don't need to change this policy.
    Content-Security-Policy = "default-src 'none'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"

# Redirect rules for social media crawlers to the serverless function
[[redirects]]
  from = "/share/:type/:id"
  to = "/.netlify/functions/generate-card"
  status = 200 # Serve the function's content directly
  force = true # Ensure this rule runs even if a file exists at the path
  conditions = { User-Agent = ["Twitterbot", "facebookexternalhit", "LinkedInBot", "Discordbot"] }

# Redirect rule for real users visiting a shared certificate link
[[redirects]]
  from = "/share/certificate/:id"
  to = "/certificate.html#:id"
  status = 301 # Permanent redirect

# Redirect rule for real users visiting a shared project link
[[redirects]]
  from = "/share/project/:id"
  to = "/projects.html#:id"
  status = 301

# Redirect rule for real users visiting a shared testimonial link
[[redirects]]
  from = "/share/testimonial/:id"
  to = "/testimonials.html#:id"
  status = 301